substitutions:
  devicename: pwm-test-1

esphome:
  name: $devicename
  friendly_name: $devicename

esp32:
  board: esp32dev
  framework:
    type: arduino

# ---------------------------------------------------------------------------
# Logging and OTA
# ---------------------------------------------------------------------------
logger:
  level: DEBUG

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "${devicename} Fallback Hotspot"
    password: !secret ap_password
  manual_ip:
    static_ip: 10.0.1.219  # whatever IP the device already uses
    gateway: 10.0.1.1
    subnet: 255.255.255.0

web_server:
  port: 80

api:
  reboot_timeout: 0s

captive_portal:

# ---------------------------------------------------------------------------
# MQTT
# ---------------------------------------------------------------------------
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_user
  password: !secret mqtt_password
  client_id: $devicename

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO26
    frequency: 12000 Hz # Typical 25000
    id: fan_pwm
    min_power: 0.0
    max_power: 0.96
    zero_means_zero: true

# ---------------------------------------------------------------------------
# Fan
# ---------------------------------------------------------------------------
fan:
  - platform: speed
    name: "PWM Fan"
    output: fan_pwm
    restore_mode: RESTORE_DEFAULT_ON

# ---------------------------------------------------------------------------
# Sensors
# ---------------------------------------------------------------------------
sensor:
  - platform: pulse_counter
    pin: GPIO13
    name: PWM Fan RPM
    id: fan_pulse
    unit_of_measurement: 'RPM'
    filters:
      - multiply: 0.5
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    update_interval: 5s
    on_value:
      then:
        - mqtt.publish:
            topic: "${devicename}/RPM"
            payload: !lambda 'return to_string(x);'

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    on_value:
      then:
        - mqtt.publish:
            topic: "${devicename}/rssi"
            payload: !lambda 'return to_string(x);'

  - platform: uptime
    name: "Uptime Sensor"
    id: uptime_sensor
    update_interval: 60s
    on_value:
      then:
        - mqtt.publish:
            topic: "${devicename}/uptime_s"
            payload: !lambda 'return to_string(x);'

text_sensor:
  - platform: template
    name: "Uptime Human Readable"
    id: uptime_human
    icon: "mdi:clock-start"
    update_interval: 60s
    lambda: |-
      int s = (int) id(uptime_sensor).state;
      int d = s / 86400; s %= 86400;
      int h = s / 3600;  s %= 3600;
      int m = s / 60;    s %= 60;
      char buf[32];
      sprintf(buf, "%dd %dh %dm %ds", d, h, m, s);
      return std::string(buf);
